name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2.1.8
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2.1.4

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t us-east1-docker.pkg.dev/geo-ml-treehunt/geo-ml-treehunt/api:${{ github.sha }} \
            -t us-east1-docker.pkg.dev/geo-ml-treehunt/geo-ml-treehunt/api:latest \
            apps/api

      - name: Push Docker image
        run: docker push --all-tags us-east1-docker.pkg.dev/geo-ml-treehunt/geo-ml-treehunt/api

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy geo-ml-treehunt-api \
            --image us-east1-docker.pkg.dev/geo-ml-treehunt/geo-ml-treehunt/api:${{ github.sha }} \
            --platform managed \
            --region us-east1 \
            --allow-unauthenticated \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }},DATABASE_SSL=true,ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}"
